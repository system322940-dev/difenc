<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>difenc terminal</title>
    <style>
        body { font-family: monospace; background-color: #1e1e2e; color: #cdd6f4; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #89b4fa; }
        .container { background-color: #181825; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 10px; margin-top: 5px; background: #313244; color: #cdd6f4; border: 1px solid #45475a; box-sizing: border-box; }
        button { background: #89b4fa; color: #11111b; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #b4befe; }
        .log { margin-top: 15px; color: #f38ba8; }
    </style>
</head>
<body>

    <h1>difenc</h1>
    
    <div class="container">
        <label>Key</label>
        <input type="text" id="keyInput" value="aaa">
    </div>

    <div class="container">
        <label>Input (Plain Text or Encrypted JWT)</label>
        <textarea id="dataInput" rows="5"></textarea>
        
        <div>
            <button onclick="sendRequest('encrypt')">Encrypt</button>
            <button onclick="sendRequest('decrypt')" style="background: #a6e3a1;">Decrypt</button>
        </div>
    </div>

    <div class="container">
        <label>Output</label>
        <textarea id="dataOutput" rows="5" readonly></textarea>
        <div id="status" class="log">Ready</div>
    </div>

    <script>
        // デプロイしたCloudflare WorkerのURLをここに入れます
        const WORKER_URL = "https://your-worker-name.your-subdomain.workers.dev";

        async function sendRequest(action) {
            const key = document.getElementById('keyInput').value;
            const payload = document.getElementById('dataInput').value;
            const statusEl = document.getElementById('status');
            const outputEl = document.getElementById('dataOutput');

            if (!key || !payload) {
                statusEl.innerText = "Key and Input are required.";
                return;
            }

            statusEl.innerText = "Processing...";
            outputEl.value = "";

            try {
                // ロジックは全てサーバー(Worker)に丸投げ
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, payload, key })
                });

                if (!response.ok) throw new Error("Network response was not ok");
                
                // データだけをシンプルに受け取る
                const resultText = await response.text();
                outputEl.value = resultText;
                statusEl.innerText = `${action.toUpperCase()} completed.`;

            } catch (error) {
                statusEl.innerText = "Communication error.";
            }
        }
    </script>
</body>
</html>
